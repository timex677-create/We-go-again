<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Church Bible Review</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5fb;
color:#333;
}

header{
background:#6a0dad;
color:white;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:20px;
font-weight:bold;
}

#title{
animation:floatText 3s infinite ease-in-out;
}

@keyframes floatText{
0%{transform:translateY(0)}
50%{transform:translateY(-4px)}
100%{transform:translateY(0)}
}

.menu{
font-size:26px;
cursor:pointer;
}

.container{
padding:20px;
max-width:900px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
margin-bottom:20px;
}

h2{
margin-top:0;
}

.bookGrid{
display:flex;
flex-wrap:wrap;
gap:6px;
}

.book{
background:#eee;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
font-size:13px;
}

.book:hover{
background:#d7c9ff;
}

#chapterContainer{
display:grid;
grid-template-columns:repeat(auto-fill,40px);
gap:8px;
}

.chapter{
width:40px;
height:40px;
display:flex;
align-items:center;
justify-content:center;
border-radius:6px;
background:#eee;
cursor:pointer;
font-size:13px;
}

.chapter:hover{
background:#ddd;
}

.selected{
background:#ff9800;
color:white;
}

textarea{
width:100%;
height:100px;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#6a0dad;
color:white;
border:none;
padding:12px;
border-radius:6px;
width:100%;
cursor:pointer;
font-size:15px;
}

button:hover{
background:#5a0bb8;
}

#adminPanel{
position:fixed;
top:0;
right:-400px;
width:350px;
height:100%;
background:white;
box-shadow:-4px 0 10px rgba(0,0,0,0.2);
padding:20px;
overflow:auto;
transition:0.4s;
}

#adminPanel.open{
right:0;
}

.closeBtn{
background:red;
margin-bottom:15px;
}

.review{
border-bottom:1px solid #eee;
padding:8px 0;
font-size:14px;
}

</style>
</head>

<body>

<header>
<div id="title">📖 Drop Your Bible Review</div>
<div class="menu" onclick="toggleAdmin()">☰</div>
</header>

<div class="container">

<div class="card" id="assignmentCard"></div>

<div class="card">
<h2>Select Book</h2>
<div class="bookGrid" id="bookGrid"></div>
</div>

<div class="card">
<h2>Chapters</h2>
<div id="chapterContainer"></div>
</div>

<div class="card">
<h2>Submit Reflection</h2>

<input id="name" placeholder="Your Name">

<textarea id="review" placeholder="Write your reflection here..."></textarea>

<button onclick="submitReview()">Submit Reflection</button>

</div>

</div>

<div id="adminPanel">

<button class="closeBtn" onclick="toggleAdmin()">Close</button>

<h2>Submissions</h2>
<div id="reviews"></div>

<h2>🏆 Leaderboard</h2>
<div id="leaderboard"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyB_s-sIVQDCpmnSuqvVIVWRmy_cta8myoM",
authDomain: "church-bible-review.firebaseapp.com",
projectId: "church-bible-review",
storageBucket: "church-bible-review.firebasestorage.app",
messagingSenderId: "53543883622",
appId: "1:53543883622:web:95cb620a9bd60c0abb2ea7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const books = {

Genesis:50,Exodus:40,Leviticus:27,Numbers:36,Deuteronomy:34,
Joshua:24,Judges:21,Ruth:4,1Samuel:31,2Samuel:24,
1Kings:22,2Kings:25,1Chronicles:29,2Chronicles:36,
Ezra:10,Nehemiah:13,Esther:10,Job:42,Psalms:150,
Proverbs:31,Ecclesiastes:12,SongOfSolomon:8,
Isaiah:66,Jeremiah:52,Lamentations:5,Ezekiel:48,
Daniel:12,Hosea:14,Joel:3,Amos:9,Obadiah:1,
Jonah:4,Micah:7,Nahum:3,Habakkuk:3,
Zephaniah:3,Haggai:2,Zechariah:14,Malachi:4,
Matthew:28,Mark:16,Luke:24,John:21,Acts:28,
Romans:16,1Corinthians:16,2Corinthians:13,
Galatians:6,Ephesians:6,Philippians:4,
Colossians:4,1Thessalonians:5,2Thessalonians:3,
1Timothy:6,2Timothy:4,Titus:3,Philemon:1,
Hebrews:13,James:5,1Peter:5,2Peter:3,
1John:5,2John:1,3John:1,Jude:1,Revelation:22

};

let selectedBook="Matthew";

const startDate = new Date("2026-03-09");

function getWeekChapter(){

const now = new Date();
const diff = now - startDate;
const week = Math.floor(diff/(1000*60*60*24*7));

return week+1;

}

let selectedChapter = getWeekChapter();

const totalStudents = 20;

function renderBooks(){

const grid=document.getElementById("bookGrid");

Object.keys(books).forEach(book=>{

const btn=document.createElement("div");
btn.className="book";
btn.innerText=book;

btn.onclick=()=>{
selectedBook=book;
renderChapters();
updateAssignment();
};

grid.appendChild(btn);

});

}

function renderChapters(){

const container=document.getElementById("chapterContainer");
container.innerHTML="";

for(let i=1;i<=books[selectedBook];i++){

const ch=document.createElement("div");

ch.className="chapter";

if(i===selectedChapter) ch.classList.add("selected");

ch.innerText=i;

ch.onclick=()=>{
selectedChapter=i;
renderChapters();
updateAssignment();
};

container.appendChild(ch);

}

}

async function updateAssignment(){

const snapshot = await getDocs(collection(db,"reviews"));

let count=0;

snapshot.forEach(doc=>{

const data=doc.data();

if(data.book===selectedBook && data.chapter===selectedChapter){
count++;
}

});

document.getElementById("assignmentCard").innerHTML=`
<h2>This Week's Assignment</h2>
<p><b>${selectedBook} ${selectedChapter}</b></p>
<p>${count} / ${totalStudents} students submitted</p>
`;

}

async function submitReview(){

const name=document.getElementById("name").value.trim();
const review=document.getElementById("review").value.trim();

if(!name||!review){
alert("Fill all fields");
return;
}

await addDoc(collection(db,"reviews"),{
name,
review,
book:selectedBook,
chapter:selectedChapter,
date:new Date()
});

alert("Submitted!");

document.getElementById("review").value="";

updateAssignment();

}

function toggleAdmin(){

const panel=document.getElementById("adminPanel");

panel.classList.toggle("open");

loadReviews();
loadLeaderboard();

}

async function loadReviews(){

const snapshot=await getDocs(collection(db,"reviews"));

const box=document.getElementById("reviews");

box.innerHTML="";

snapshot.forEach(doc=>{

const data=doc.data();

const div=document.createElement("div");

div.className="review";

div.innerHTML=`<b>${data.name}</b> - ${data.book} ${data.chapter}<br>${data.review}`;

box.appendChild(div);

});

}

async function loadLeaderboard(){

const snapshot=await getDocs(collection(db,"reviews"));

const scores={};

snapshot.forEach(doc=>{

const data=doc.data();

if(!scores[data.name]) scores[data.name]=0;

scores[data.name]++;

});

const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);

const board=document.getElementById("leaderboard");

board.innerHTML="";

sorted.forEach((item,index)=>{

const row=document.createElement("div");

row.innerHTML=`${index+1}. ${item[0]} — ${item[1]} submissions`;

board.appendChild(row);

});

}

renderBooks();
renderChapters();
updateAssignment();

</script>

</body>
</html>
